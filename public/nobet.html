<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nöbet Yönetimi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; }

    .topbar {
      background: #1a73e8; color: white;
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar h1 { font-size: 18px; font-weight: 600; }
    .btn-geri {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; text-decoration: none;
    }

    .icerik { padding: 24px; max-width: 1100px; margin: 0 auto; }

    .kontrol-bar {
      background: white; border-radius: 10px;
      padding: 16px 20px; margin-bottom: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }

    .hafta-bilgi {
      flex: 1; font-size: 15px; font-weight: 600; color: #333;
    }

    .hafta-bilgi span {
      font-size: 13px; font-weight: 400; color: #666; margin-left: 8px;
    }

    .btn {
      padding: 9px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-mavi { background: #1a73e8; color: white; }
    .btn-mavi:hover { background: #1557b0; }
    .btn-yesil { background: #34a853; color: white; }
    .btn-yesil:hover { background: #2d8f47; }
    .btn-turuncu { background: #f9ab00; color: white; }
    .btn-turuncu:hover { background: #e37400; }
    .btn-kirmizi { background: #ea4335; color: white; }
    .btn-kirmizi:hover { background: #c5221f; }
    .btn-gri { background: #666; color: white; }
    .btn-gri:hover { background: #444; }
    .btn-kucuk { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .durum-rozet {
      padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .durum-aktif { background: #e6f4ea; color: #1e7e34; }
    .durum-durduruldu { background: #fce8e6; color: #c5221f; }

    .nobet-tablo {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      overflow: hidden; margin-bottom: 20px;
    }

    .nobet-tablo table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }

    .nobet-tablo th {
      background: #1a73e8; color: white;
      padding: 12px 14px; text-align: center; font-weight: 600;
    }

    .nobet-tablo th:first-child { text-align: left; width: 160px; }

    .nobet-tablo td {
      padding: 10px 14px; border-bottom: 1px solid #f0f0f0;
      text-align: center; color: #333;
    }

    .nobet-tablo td:first-child {
      text-align: left; font-weight: 600;
      background: #f8f9fa; color: #555;
      border-right: 2px solid #e0e0e0;
    }

    .nobet-tablo tr:last-child td { border-bottom: none; }
    .nobet-tablo tr:hover td { background: #f8fbff; }
    .nobet-tablo tr:hover td:first-child { background: #f0f4f8; }

    .sabit-isim { color: #1a73e8; font-weight: 600; }

    .admin-panel {
      background: white; border-radius: 10px;
      padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .admin-panel h3 {
      font-size: 15px; color: #333; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;
    }

    .admin-butonlar {
      display: flex; gap: 10px; flex-wrap: wrap;
    }

    .mesaj-kutusu {
      margin-top: 12px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; display: none;
    }
    .mesaj-basari { background: #e6f4ea; color: #1e7e34; }
    .mesaj-hata { background: #fce8e6; color: #c5221f; }
    .mesaj-bilgi { background: #e8f0fe; color: #1a73e8; }

    .yukleniyor { text-align: center; padding: 40px; color: #666; }

    .benim-nobetim {
      background: #e8f0fe; border: 2px solid #1a73e8;
      border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;
    }
    .benim-nobetim h3 { font-size: 15px; color: #1a73e8; margin-bottom: 10px; }
    .nobet-satir {
      display: flex; gap: 12px; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #c5d8ff; font-size: 14px;
    }
    .nobet-satir:last-child { border-bottom: none; }
    .nobet-gun { font-weight: 600; min-width: 100px; color: #333; }
    .nobet-nokta { color: #1a73e8; font-weight: 500; }

    .nokta-liste { margin-top: 12px; }
    .nokta-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #f0f0f0;
    }
    .nokta-item:last-child { border-bottom: none; }
    .nokta-no { font-size: 12px; color: #888; min-width: 24px; }
    .nokta-ad { flex: 1; font-size: 14px; font-weight: 600; color: #333; }
    .nokta-input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Nobet Yonetimi</h1>
    <a href="/portal.html" class="btn-geri">Ana Sayfaya Don</a>
  </div>

  <div class="icerik">
    <div id="yukleniyor" class="yukleniyor">Yukleniyor...</div>
    <div id="anaIcerik" style="display:none;">

      <!-- KENDİ NÖBETİM -->
      <div id="benimNobetimKarti" style="display:none;">
        <div class="benim-nobetim">
          <h3>Bu Haftaki Nobetiniz</h3>
          <div id="benimNobetim"></div>
        </div>
      </div>

      <!-- KONTROL BARI -->
      <div class="kontrol-bar">
        <div class="hafta-bilgi">
          <span id="haftaBaslangicMetin">-</span>
          <span id="durumRozet" class="durum-rozet durum-aktif">Aktif</span>
        </div>
        <button class="btn btn-gri" onclick="nobetGeriAl()" id="btnGeri">Geri Al</button>
        <button class="btn btn-mavi" onclick="nobetIleri()" id="btnIleri">Ileri Al</button>
        <button class="btn btn-turuncu" onclick="rotasyonDurdur()" id="btnDurdur">Rotasyonu Durdur</button>
        <button class="btn btn-yesil" onclick="telegramGonder()" id="btnTelegram">Telegrama Gonder</button>
      </div>

      <!-- NÖBET TABLOSU -->
      <div class="nobet-tablo">
        <div id="nobetTablosu"><div class="yukleniyor">Yukleniyor...</div></div>
      </div>

      <!-- ADMIN PANELİ -->
      <div class="admin-panel" id="adminPanel" style="display:none;">
        <h3>Nobet Yonetimi</h3>
        <div class="admin-butonlar">
          <button class="btn btn-mavi" onclick="nobetDuzenle()">Nobetcileri Duzenle</button>
          <button class="btn btn-kirmizi" onclick="nobetSifirla()">Haftayi Sifirla</button>
          <button class="btn btn-gri" onclick="noktaYonetimiAc()">Nobet Noktalarini Yonet</button>
        </div>
        <div class="mesaj-kutusu" id="adminMesaj"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
    import {
      getFirestore, doc, getDoc, setDoc, getDocs,
      collection, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHTCiicd4b94rG1-jN0STRbwcrLmkYudo",
      authDomain: "okul-yoklama-sistemi-8081f.firebaseapp.com",
      projectId: "okul-yoklama-sistemi-8081f",
      storageBucket: "okul-yoklama-sistemi-8081f.firebasestorage.app",
      messagingSenderId: "38230047763",
      appId: "1:38230047763:web:dfab058df8928b66be13e6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const functions = getFunctions(app, 'us-central1');

    const VARSAYILAN_NOKTALAR = [
      "On Bahce Dis Kapi",
      "On Bahce Hali Saha Kapisi",
      "On Bahce Okul Girisi",
      "Arka Bahce Dis Kapi",
      "Arka Bahce Okul Girisi",
      "Zemin Kat Sag",
      "Zemin Kat Sol",
      "1. Kat Sag",
      "1. Kat Sol",
      "2. Kat Sag",
      "2. Kat Sol"
    ];

    const GUNLER = ["Pazartesi", "Sali", "Carsamba", "Persembe", "Cuma"];

    let aktifKullanici = null;
    let aktifRol = null;
    let nobetVerisi = null;
    let NOKTALAR = [];

    // Nöbet noktalarını Firestore'dan yükle
    async function noktalariYukle() {
      const nokDoc = await getDoc(doc(db, 'nobet_ayarlar', 'noktalar'));
      if (!nokDoc.exists()) {
        // İlk kurulum — varsayılan noktaları kaydet
        await setDoc(doc(db, 'nobet_ayarlar', 'noktalar'), {
          liste: VARSAYILAN_NOKTALAR,
          guncelleme: serverTimestamp()
        });
        NOKTALAR = [...VARSAYILAN_NOKTALAR];
      } else {
        NOKTALAR = nokDoc.data().liste || VARSAYILAN_NOKTALAR;
      }
    }

    const BASLANGIC_VERISI = {
      hafta_baslangic: "2026-04-14",
      rotasyon_aktif: true,
      rotasyon_sayaci: 0,
      gunler: [
        { gun: "Pazartesi", nobetciler: [] },
        { gun: "Sali", nobetciler: [] },
        { gun: "Carsamba", nobetciler: [] },
        { gun: "Persembe", nobetciler: [] },
        { gun: "Cuma", nobetciler: [] }
      ]
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/portal.html'; return; }

      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists()) { window.location.href = '/portal.html'; return; }

      aktifKullanici = userDoc.data();
      aktifRol = aktifKullanici.rol;

      if (aktifRol === 'admin' || aktifRol === 'mudur_yardimcisi') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('btnGeri').style.display = 'inline-block';
        document.getElementById('btnIleri').style.display = 'inline-block';
        document.getElementById('btnDurdur').style.display = 'inline-block';
        document.getElementById('btnTelegram').style.display = 'inline-block';
      } else {
        document.getElementById('btnGeri').style.display = 'none';
        document.getElementById('btnIleri').style.display = 'none';
        document.getElementById('btnDurdur').style.display = 'none';
        document.getElementById('btnTelegram').style.display = 'none';
      }

      await noktalariYukle();
      await nobetYukle();
    });

    async function nobetYukle() {
      try {
        const nobetDoc = await getDoc(doc(db, 'nobet_ayarlar', 'mevcut'));
        if (!nobetDoc.exists()) {
          // İlk kurulum — her gün için nokta sayısı kadar boş nobetci
          const baslangic = JSON.parse(JSON.stringify(BASLANGIC_VERISI));
          baslangic.gunler = baslangic.gunler.map(g => ({
            ...g,
            nobetciler: Array(NOKTALAR.length).fill('-')
          }));
          await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), {
            ...baslangic,
            olusturulma: serverTimestamp()
          });
          nobetVerisi = baslangic;
        } else {
          nobetVerisi = nobetDoc.data();
          // Nokta sayısı değiştiyse güncelle
          nobetVerisi.gunler = nobetVerisi.gunler.map(g => {
            const nobetciler = [...(g.nobetciler || [])];
            while (nobetciler.length < NOKTALAR.length) nobetciler.push('-');
            return { ...g, nobetciler: nobetciler.slice(0, NOKTALAR.length) };
          });
        }

        tabloGoster();
        benimNobetimGoster();

        document.getElementById('yukleniyor').style.display = 'none';
        document.getElementById('anaIcerik').style.display = 'block';

      } catch (err) {
        console.error(err);
        document.getElementById('yukleniyor').textContent = 'Hata: ' + err.message;
      }
    }

    function tabloGoster() {
      const baslangic = new Date(nobetVerisi.hafta_baslangic + 'T12:00:00');
      const bitis = new Date(baslangic);
      bitis.setDate(baslangic.getDate() + 4);

      const formatTarih = (d) => d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
      document.getElementById('haftaBaslangicMetin').textContent =
        formatTarih(baslangic) + ' - ' + formatTarih(bitis);

      const rozet = document.getElementById('durumRozet');
      if (nobetVerisi.rotasyon_aktif) {
        rozet.textContent = 'Rotasyon Aktif';
        rozet.className = 'durum-rozet durum-aktif';
        document.getElementById('btnDurdur').textContent = 'Rotasyonu Durdur';
      } else {
        rozet.textContent = 'Rotasyon Durduruldu';
        rozet.className = 'durum-rozet durum-durduruldu';
        document.getElementById('btnDurdur').textContent = 'Rotasyonu Baslat';
      }

      let html = '<table><thead><tr><th>Nobet Noktasi</th>';
      nobetVerisi.gunler.forEach(g => {
        const gunTarihi = new Date(nobetVerisi.hafta_baslangic + 'T12:00:00');
        const gunIndex = ['Pazartesi', 'Sali', 'Carsamba', 'Persembe', 'Cuma'].indexOf(g.gun);
        gunTarihi.setDate(gunTarihi.getDate() + gunIndex);
        const tarihStr = gunTarihi.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit' });
        html += '<th>' + g.gun + '<br><small>' + tarihStr + '</small></th>';
      });
      html += '</tr></thead><tbody>';

      for (let i = 0; i < NOKTALAR.length; i++) {
        html += '<tr><td>' + NOKTALAR[i] + '</td>';
        nobetVerisi.gunler.forEach(g => {
          const isim = (g.nobetciler && g.nobetciler[i]) || '-';
          const sabit = isim.includes('(S)');
          html += '<td class="' + (sabit ? 'sabit-isim' : '') + '">' + isim + '</td>';
        });
        html += '</tr>';
      }

      html += '</tbody></table>';
      document.getElementById('nobetTablosu').innerHTML = html;
    }

    function benimNobetimGoster() {
      if (aktifRol !== 'ogretmen') return;

      const adSoyad = aktifKullanici.ad || '';
      const kisimlar = adSoyad.trim().split(' ');
      let kisaltma = '';
      if (kisimlar.length >= 2) {
        kisaltma = kisimlar[0].charAt(0) + '.' + kisimlar[kisimlar.length - 1];
      }

      const benimNobetlerim = [];
      nobetVerisi.gunler.forEach(g => {
        (g.nobetciler || []).forEach((nobetci, noktaIdx) => {
          const temizIsim = nobetci.replace(' (S)', '').replace('_', '').trim();
          if (temizIsim.toUpperCase().includes(kisaltma.toUpperCase()) ||
              temizIsim.toUpperCase().includes(adSoyad.toUpperCase())) {
            benimNobetlerim.push({ gun: g.gun, nokta: NOKTALAR[noktaIdx] });
          }
        });
      });

      if (benimNobetlerim.length > 0) {
        document.getElementById('benimNobetimKarti').style.display = 'block';
        let html = '';
        benimNobetlerim.forEach(n => {
          html += '<div class="nobet-satir"><span class="nobet-gun">' + n.gun + '</span><span class="nobet-nokta">' + n.nokta + '</span></div>';
        });
        document.getElementById('benimNobetim').innerHTML = html;
      }
    }

    function rotasyonUygula(gunler) {
      return gunler.map(gun => {
        const nobetciler = [...gun.nobetciler];
        const hareketli = nobetciler.filter(n => !n.includes('(S)'));
        if (hareketli.length > 1) hareketli.unshift(hareketli.pop());
        let hareketliIdx = 0;
        const yeni = nobetciler.map(n => n.includes('(S)') ? n : hareketli[hareketliIdx++]);
        return { ...gun, nobetciler: yeni };
      });
    }

    function rotasyonGeriAl(gunler) {
      return gunler.map(gun => {
        const nobetciler = [...gun.nobetciler];
        const hareketli = nobetciler.filter(n => !n.includes('(S)'));
        if (hareketli.length > 1) hareketli.push(hareketli.shift());
        let hareketliIdx = 0;
        const yeni = nobetciler.map(n => n.includes('(S)') ? n : hareketli[hareketliIdx++]);
        return { ...gun, nobetciler: yeni };
      });
    }

    window.nobetIleri = async () => {
      if (!nobetVerisi) return;
      const yeniGunler = nobetVerisi.rotasyon_aktif ? rotasyonUygula(nobetVerisi.gunler) : nobetVerisi.gunler;
      const mevcutBaslangic = new Date(nobetVerisi.hafta_baslangic + 'T12:00:00');
      mevcutBaslangic.setDate(mevcutBaslangic.getDate() + 7);
      const yeniVeri = { ...nobetVerisi, hafta_baslangic: mevcutBaslangic.toISOString().split('T')[0], gunler: yeniGunler, rotasyon_sayaci: (nobetVerisi.rotasyon_sayaci || 0) + 1, son_guncelleme: serverTimestamp() };
      await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), yeniVeri);
      nobetVerisi = yeniVeri;
      tabloGoster();
      mesajGoster('adminMesaj', 'Nobet bir hafta ileri alindi.', 'basari');
    };

    window.nobetGeriAl = async () => {
      if (!nobetVerisi) return;
      const yeniGunler = nobetVerisi.rotasyon_aktif ? rotasyonGeriAl(nobetVerisi.gunler) : nobetVerisi.gunler;
      const mevcutBaslangic = new Date(nobetVerisi.hafta_baslangic + 'T12:00:00');
      mevcutBaslangic.setDate(mevcutBaslangic.getDate() - 7);
      const yeniVeri = { ...nobetVerisi, hafta_baslangic: mevcutBaslangic.toISOString().split('T')[0], gunler: yeniGunler, rotasyon_sayaci: (nobetVerisi.rotasyon_sayaci || 0) - 1, son_guncelleme: serverTimestamp() };
      await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), yeniVeri);
      nobetVerisi = yeniVeri;
      tabloGoster();
      mesajGoster('adminMesaj', 'Nobet bir hafta geri alindi.', 'basari');
    };

    window.rotasyonDurdur = async () => {
      if (!nobetVerisi) return;
      const yeniDurum = !nobetVerisi.rotasyon_aktif;
      const yeniVeri = { ...nobetVerisi, rotasyon_aktif: yeniDurum, son_guncelleme: serverTimestamp() };
      await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), yeniVeri);
      nobetVerisi = yeniVeri;
      tabloGoster();
      mesajGoster('adminMesaj', yeniDurum ? 'Rotasyon baslatildi.' : 'Rotasyon durduruldu.', yeniDurum ? 'basari' : 'hata');
    };

    window.telegramGonder = async () => {
      if (!nobetVerisi) return;
      document.getElementById('btnTelegram').disabled = true;
      try {
        await auth.currentUser.getIdToken(true);
        const nobetGonder = httpsCallable(functions, 'nobetTelegramGonder');
        await nobetGonder({});
        mesajGoster('adminMesaj', 'Nobet listesi Telegrama gonderildi!', 'basari');
      } catch (err) {
        mesajGoster('adminMesaj', 'Hata: ' + err.message, 'hata');
      }
      document.getElementById('btnTelegram').disabled = false;
    };

    window.nobetDuzenle = () => {
      if (!nobetVerisi) return;
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;justify-content:center;align-items:center;';
      overlay.id = 'duzenleModal';
      let html = '<div style="background:white;border-radius:12px;padding:24px;width:90%;max-width:750px;max-height:85vh;overflow-y:auto;">';
      html += '<div style="font-size:17px;font-weight:600;color:#333;margin-bottom:16px;">Nobetcileri Duzenle</div>';
      nobetVerisi.gunler.forEach((gun, gunIdx) => {
        html += '<div style="margin-bottom:16px;"><div style="font-weight:600;color:#1a73e8;margin-bottom:8px;">' + gun.gun + '</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
        NOKTALAR.forEach((nokta, noktaIdx) => {
          const mevcut = (gun.nobetciler && gun.nobetciler[noktaIdx]) || '-';
          html += '<div style="display:flex;align-items:center;gap:6px;"><span style="font-size:11px;color:#888;min-width:120px;">' + nokta + '</span><input type="text" value="' + mevcut + '" data-gun="' + gunIdx + '" data-nokta="' + noktaIdx + '" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;"></div>';
        });
        html += '</div></div>';
      });
      html += '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;"><button onclick="document.getElementById(\'duzenleModal\').remove()" style="padding:9px 18px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:13px;">Iptal</button><button onclick="nobetDuzenleKaydet()" style="padding:9px 18px;border:none;border-radius:8px;background:#34a853;color:white;cursor:pointer;font-size:13px;font-weight:600;">Kaydet</button></div></div>';
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
    };

    window.nobetDuzenleKaydet = async () => {
      const inputs = document.querySelectorAll('#duzenleModal input');
      const yeniGunler = JSON.parse(JSON.stringify(nobetVerisi.gunler));
      inputs.forEach(input => {
        const gunIdx = parseInt(input.dataset.gun);
        const noktaIdx = parseInt(input.dataset.nokta);
        if (!yeniGunler[gunIdx].nobetciler) yeniGunler[gunIdx].nobetciler = [];
        yeniGunler[gunIdx].nobetciler[noktaIdx] = input.value.trim();
      });
      const yeniVeri = { ...nobetVerisi, gunler: yeniGunler, son_guncelleme: serverTimestamp() };
      await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), yeniVeri);
      nobetVerisi = yeniVeri;
      document.getElementById('duzenleModal').remove();
      tabloGoster();
      mesajGoster('adminMesaj', 'Nobetciler guncellendi.', 'basari');
    };

    window.nobetSifirla = async () => {
      if (!confirm('Nobeti sifirlamak istediginize emin misiniz? Tum nobetci isimleri silinecek.')) return;
      const baslangic = JSON.parse(JSON.stringify(BASLANGIC_VERISI));
      baslangic.gunler = baslangic.gunler.map(g => ({
        ...g, nobetciler: Array(NOKTALAR.length).fill('-')
      }));
      await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), { ...baslangic, olusturulma: serverTimestamp() });
      nobetVerisi = baslangic;
      tabloGoster();
      mesajGoster('adminMesaj', 'Nobet sifirlandı.', 'basari');
    };

    // NÖBET NOKTALARI YÖNETİMİ
    window.noktaYonetimiAc = () => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;justify-content:center;align-items:center;';
      overlay.id = 'noktaModal';

      let html = '<div style="background:white;border-radius:12px;padding:24px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;">';
      html += '<div style="font-size:17px;font-weight:600;color:#333;margin-bottom:8px;">Nobet Noktalarini Yonet</div>';
      html += '<div style="font-size:12px;color:#888;margin-bottom:16px;">Nokta adlarini duzenleyin. Kaydettiginizde nobet tablosu guncellenir.</div>';
      html += '<div id="noktaListesiModal">';

      NOKTALAR.forEach((nokta, idx) => {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;">';
        html += '<span style="font-size:12px;color:#888;min-width:20px;">' + (idx + 1) + '.</span>';
        html += '<input type="text" value="' + nokta + '" data-idx="' + idx + '" id="noktaInput' + idx + '" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">';
        html += '<button onclick="noktaSil(' + idx + ')" style="padding:5px 10px;border:none;border-radius:6px;background:#fce8e6;color:#c5221f;cursor:pointer;font-size:12px;font-weight:600;">Sil</button>';
        html += '</div>';
      });

      html += '</div>';
      html += '<div style="margin-top:12px;display:flex;gap:8px;align-items:center;">';
      html += '<input type="text" id="yeniNoktaAdi" placeholder="Yeni nokta adi..." style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;">';
      html += '<button onclick="noktaEkle()" style="padding:8px 14px;border:none;border-radius:6px;background:#34a853;color:white;cursor:pointer;font-size:13px;font-weight:600;">+ Ekle</button>';
      html += '</div>';
      html += '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;">';
      html += '<button onclick="document.getElementById(\'noktaModal\').remove()" style="padding:9px 18px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:13px;">Iptal</button>';
      html += '<button onclick="noktalariKaydet()" style="padding:9px 18px;border:none;border-radius:8px;background:#1a73e8;color:white;cursor:pointer;font-size:13px;font-weight:600;">Kaydet</button>';
      html += '</div></div>';

      overlay.innerHTML = html;
      document.body.appendChild(overlay);
    };

    window.noktaEkle = () => {
      const input = document.getElementById('yeniNoktaAdi');
      const ad = input.value.trim();
      if (!ad) return;
      const liste = document.getElementById('noktaListesiModal');
      const idx = liste.children.length;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;';
      div.innerHTML = '<span style="font-size:12px;color:#888;min-width:20px;">' + (idx + 1) + '.</span>' +
        '<input type="text" value="' + ad + '" data-idx="' + idx + '" id="noktaInput' + idx + '" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">' +
        '<button onclick="this.parentElement.remove()" style="padding:5px 10px;border:none;border-radius:6px;background:#fce8e6;color:#c5221f;cursor:pointer;font-size:12px;font-weight:600;">Sil</button>';
      liste.appendChild(div);
      input.value = '';
    };

    window.noktaSil = (idx) => {
      const input = document.getElementById('noktaInput' + idx);
      if (input) input.closest('div').remove();
    };

    window.noktalariKaydet = async () => {
      const inputs = document.querySelectorAll('#noktaListesiModal input[type="text"]');
      const yeniListe = [];
      inputs.forEach(inp => {
        const ad = inp.value.trim();
        if (ad) yeniListe.push(ad);
      });

      if (yeniListe.length === 0) {
        alert('En az 1 nokta olmali.');
        return;
      }

      // Firestore'a kaydet
      await setDoc(doc(db, 'nobet_ayarlar', 'noktalar'), {
        liste: yeniListe,
        guncelleme: serverTimestamp()
      });

      NOKTALAR = yeniListe;

      // Mevcut nöbet verisini nokta sayısına göre güncelle
      if (nobetVerisi) {
        nobetVerisi.gunler = nobetVerisi.gunler.map(g => {
          const nobetciler = [...(g.nobetciler || [])];
          while (nobetciler.length < NOKTALAR.length) nobetciler.push('-');
          return { ...g, nobetciler: nobetciler.slice(0, NOKTALAR.length) };
        });
        await setDoc(doc(db, 'nobet_ayarlar', 'mevcut'), { ...nobetVerisi, son_guncelleme: serverTimestamp() });
      }

      document.getElementById('noktaModal').remove();
      tabloGoster();
      mesajGoster('adminMesaj', yeniListe.length + ' nobet noktasi kaydedildi.', 'basari');
    };

    function mesajGoster(id, metin, tip) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = metin;
      el.className = 'mesaj-kutusu mesaj-' + tip;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

  </script>
</body>
</html>
