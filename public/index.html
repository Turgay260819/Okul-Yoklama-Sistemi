<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okul Yoklama Sistemi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      text-align: center;
      color: #1a73e8;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-card p {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #1a73e8;
    }

    .btn-giris {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-giris:hover {
      background: #1557b0;
    }

    .hata-mesaji {
      background: #fce8e6;
      color: #c5221f;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .yukleniyor {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h1>📋 Yoklama Sistemi</h1>
    <p>Devam etmek için giriş yapın</p>

    <div class="hata-mesaji" id="hataMesaji"></div>

    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="email" placeholder="ornek@okul.com">
    </div>

    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="sifre" placeholder="••••••••">
    </div>

    <button class="btn-giris" onclick="girisYap()">Giriş Yap</button>
    <div class="yukleniyor" id="yukleniyor">⏳ Giriş yapılıyor...</div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase yapılandırması — bunu dolduracağız
    const firebaseConfig = {
      apiKey: "AIzaSyAHTCiicd4b94rG1-jN0STRbwcrLmkYudo",
      authDomain: "okul-yoklama-sistemi-8081f.firebaseapp.com",
      projectId: "okul-yoklama-sistemi-8081f",
      storageBucket: "okul-yoklama-sistemi-8081f.firebasestorage.app",
      messagingSenderId: "38230047763",
      appId: "1:38230047763:web:dfab058df8928b66be13e6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.girisYap = async function() {
      const email = document.getElementById('email').value.trim();
      const sifre = document.getElementById('sifre').value;
      const hata = document.getElementById('hataMesaji');
      const yukleniyor = document.getElementById('yukleniyor');

      hata.style.display = 'none';
      yukleniyor.style.display = 'block';

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, sifre);
        const uid = userCredential.user.uid;

        // Kullanıcı rolünü Firestore'dan al
        const userDoc = await getDoc(doc(db, 'users', uid));
        
        if (!userDoc.exists()) {
          throw new Error('Kullanıcı kaydı bulunamadı.');
        }

        const rol = userDoc.data().rol;

        // Role göre yönlendir
        if (rol === 'admin' || rol === 'mudur_yardimcisi') {
          window.location.href = '/admin.html';
        } else if (rol === 'ogretmen') {
          window.location.href = '/ogretmen.html';
        } else {
          throw new Error('Tanımsız kullanıcı rolü.');
        }

      } catch (err) {
        yukleniyor.style.display = 'none';
        hata.style.display = 'block';

        if (err.code === 'auth/invalid-credential') {
          hata.textContent = 'E-posta veya şifre hatalı.';
        } else if (err.code === 'auth/too-many-requests') {
          hata.textContent = 'Çok fazla deneme. Lütfen bekleyin.';
        } else {
          hata.textContent = err.message;
        }
      }
    }

    // Enter tuşu ile giriş
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') girisYap();
    });
  </script>

</body>
</html>
