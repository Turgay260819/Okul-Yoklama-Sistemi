<!doctype html>
<html lang="tr">

      .btn-gri {

      .mesaj-kayan {

      }

      .yukleniyor {

      .modal-zemin {

      .modal-zemin.aktif {

      .modal-kutu {

      .modal-butonlar {

      @media (max-width: 768px) {
        .slot-grid {
          grid-template-columns: repeat(3, 1fr);

    </style>
  </head>
  <body>
    <div class="topbar">

    <div class="mesaj-kayan" id="mesajEl"></div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import {
        getFunctions,
        httpsCallable,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        getDocs,
        collection,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAHTCiicd4b94rG1-jN0STRbwcrLmkYudo",
        authDomain: "okul-yoklama-sistemi-8081f.firebaseapp.com",
        projectId: "okul-yoklama-sistemi-8081f",
        storageBucket: "okul-yoklama-sistemi-8081f.firebasestorage.app",
        messagingSenderId: "38230047763",
        appId: "1:38230047763:web:dfab058df8928b66be13e6",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const functions = getFunctions(app, "us-central1");

      const GUNLER = ["Pazartesi", "Sali", "Carsamba", "Persembe", "Cuma"];
      const VARSAYILAN_NOKTALAR = [
        "On Bahce Dis Kapi",
        "On Bahce Hali Saha Kapisi",
        "On Bahce Okul Girisi",
        "Arka Bahce Dis Kapi",
        "Arka Bahce Okul Girisi",
        "Zemin Kat Sag",
        "Zemin Kat Sol",
        "1. Kat Sag",
        "1. Kat Sol",
        "2. Kat Sag",
        "2. Kat Sol",
      ];

      let NOKTALAR = [];
      let ogretmenler = [];
      let nobetVerisi = null;
      let editSlotlar = [];
      let seciliOgr = null;

      function N() {
        return NOKTALAR.length;
      }
      function TOPLAM() {
        return 5 * N();
      }
      function slotToPos(slot) {
        return { gi: Math.floor(slot / N()), ni: slot % N() };
      }
      function posToSlot(gi, ni) {
        return gi * N() + ni;
      }

      // Serbest slot listesi - SGN slotlari haric, gun+nokta birlikte ilerler
      function serbestSlotListesi(slotlar) {
        const sgn = new Set();
        (slotlar || []).forEach((s) => {
          if (s.sabitlik === "sgn") sgn.add(s.baslangic_slot);
        });
        const liste = [];
        for (let adim = 0; adim < TOPLAM(); adim++) {
          const gi = adim % 5;
          const ni = adim % N();
          const slot = posToSlot(gi, ni);
          if (!sgn.has(slot) && !liste.includes(slot)) liste.push(slot);
        }
        return liste;
      }

      // Pozisyon hesapla
      function pozHesapla(s, sayac, slotlar) {
        if (s.sabitlik === "sgn") return slotToPos(s.baslangic_slot);
        // Serbest: serbest slot listesinde ilerle
        const serbest = serbestSlotListesi(slotlar);
        if (!serbest.length) return slotToPos(s.baslangic_slot);
        const basIdx = serbest.indexOf(s.baslangic_slot);
        const idx = basIdx < 0 ? 0 : basIdx;
        const yeniIdx =
          (((idx + sayac) % serbest.length) + serbest.length) % serbest.length;
        return slotToPos(serbest[yeniIdx]);
      }

      async function init() {
        const nokDoc = await getDoc(doc(db, "nobet2_ayarlar", "noktalar"));
        NOKTALAR = nokDoc.exists()
          ? nokDoc.data().liste || VARSAYILAN_NOKTALAR
          : VARSAYILAN_NOKTALAR;
        if (!nokDoc.exists())
          await setDoc(doc(db, "nobet2_ayarlar", "noktalar"), {
            liste: NOKTALAR,
            guncelleme: serverTimestamp(),
          });

        const ogSnap = await getDocs(collection(db, "teachers"));
        ogretmenler = [];
        ogSnap.forEach((d) => ogretmenler.push({ id: d.id, ...d.data() }));
        ogretmenler.sort((a, b) =>
          (a.ad || "").localeCompare(b.ad || "", "tr"),
        );

        const nbDoc = await getDoc(doc(db, "nobet2_ayarlar", "mevcut"));
        if (nbDoc.exists()) {
          nobetVerisi = nbDoc.data();
        } else {
          const bugun = new Date();
          const fark = bugun.getDay() === 0 ? -6 : 1 - bugun.getDay();
          const pzt = new Date(bugun);
          pzt.setDate(bugun.getDate() + fark);
          nobetVerisi = {
            hafta_baslangic: pzt.toISOString().split("T")[0],
            rotasyon_aktif: true,
            rotasyon_sayaci: 0,
            slotlar: [],
          };
        }

        tabloGoster();
        document.getElementById("yukleniyor").style.display = "none";
        document.getElementById("anaIcerik").style.display = "block";
      }

      function tabloGoster() {
        const sayac = nobetVerisi.rotasyon_sayaci || 0;
        const slotlar = nobetVerisi.slotlar || [];
        const bas = new Date(nobetVerisi.hafta_baslangic + "T12:00:00");
        const bit = new Date(bas);
        bit.setDate(bas.getDate() + 4);
        const fmt = (d) =>
          d.toLocaleDateString("tr-TR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
          });
        document.getElementById("haftaTarih").textContent =
          fmt(bas) + " — " + fmt(bit);
        document.getElementById("sayacBilgi").textContent =
          sayac + ". rotasyon";
        const aktif = nobetVerisi.rotasyon_aktif !== false;
        document.getElementById("durumRozet").textContent = aktif
          ? "Rotasyon Aktif"
          : "Durduruldu";
        document.getElementById("durumRozet").className =
          "durum-rozet " + (aktif ? "durum-aktif" : "durum-durduruldu");
        document.getElementById("btnDurdur").textContent = aktif
          ? "Durdur"
          : "Başlat";

        const pozMap = {};
        slotlar.forEach((s) => {
          const p = pozHesapla(s, sayac, slotlar);
          pozMap[p.gi + "-" + p.ni] = s;
        });

        let html =
          '<table class="nobet-tablo"><thead><tr><th>Nöbet Noktası</th>';
        GUNLER.forEach((g, gi) => {
          const gt = new Date(nobetVerisi.hafta_baslangic + "T12:00:00");
          gt.setDate(gt.getDate() + gi);
          html +=
            "<th>" +
            g +
            "<br><small>" +
            gt.toLocaleDateString("tr-TR", {
              day: "2-digit",
              month: "2-digit",
            }) +
            "</small></th>";
        });
        html += "</tr></thead><tbody>";
        NOKTALAR.forEach((nokta, ni) => {
          html += "<tr><td>" + nokta + "</td>";
          GUNLER.forEach((g, gi) => {
            const s = pozMap[gi + "-" + ni];
            if (s) {
              const sb = s.sabitlik || "serbest";
              const rz = sb === "sgn" ? "S-GN" : "";
              html +=
                '<td><div class="nobetci nobetci-' +
                sb +
                '">' +
                s.ogretmen_ad +
                (rz ? '<span class="rozet-k">' + rz + "</span>" : "") +
                "</div></td>";
            } else {
              html += '<td><div class="nobetci nobetci-bos">—</div></td>';
            }
          });
          html += "</tr>";
        });
        html += "</tbody></table>";
        document.getElementById("nobetTablosu").innerHTML = html;
      }

      window.nobetIleri = async () => {
        const bas = new Date(nobetVerisi.hafta_baslangic + "T12:00:00");
        bas.setDate(bas.getDate() + 7);
        nobetVerisi = {
          ...nobetVerisi,
          hafta_baslangic: bas.toISOString().split("T")[0],
          rotasyon_sayaci: (nobetVerisi.rotasyon_sayaci || 0) + 1,
          son_guncelleme: serverTimestamp(),
        };
        await setDoc(doc(db, "nobet2_ayarlar", "mevcut"), nobetVerisi);
        tabloGoster();
        mesaj("Bir hafta ileri alındı.", "basari");
      };

      window.nobetGeriAl = async () => {
        const bas = new Date(nobetVerisi.hafta_baslangic + "T12:00:00");
        bas.setDate(bas.getDate() - 7);
        nobetVerisi = {
          ...nobetVerisi,
          hafta_baslangic: bas.toISOString().split("T")[0],
          rotasyon_sayaci: (nobetVerisi.rotasyon_sayaci || 0) - 1,
          son_guncelleme: serverTimestamp(),
        };
        await setDoc(doc(db, "nobet2_ayarlar", "mevcut"), nobetVerisi);
        tabloGoster();
        mesaj("Bir hafta geri alındı.", "basari");
      };

      window.rotasyonDurdur = async () => {
        nobetVerisi.rotasyon_aktif = !(nobetVerisi.rotasyon_aktif !== false);
        await setDoc(doc(db, "nobet2_ayarlar", "mevcut"), {
          ...nobetVerisi,
          son_guncelleme: serverTimestamp(),
        });
        tabloGoster();
        mesaj(
          nobetVerisi.rotasyon_aktif
            ? "Rotasyon başlatıldı."
            : "Rotasyon durduruldu.",
          "bilgi",
        );
      };

      window.telegramGonder = async () => {
        mesaj("Gönderiliyor...", "bilgi");
        try {
          const fn = httpsCallable(functions, "nobetTelegramGonder");
          await fn({ tip: "nobet2" });
          mesaj("Telegram'a gönderildi!", "basari");
        } catch (e) {
          mesaj("Hata: " + e.message, "hata");
        }
      };

      window.yerlesimAc = () => {
        editSlotlar = JSON.parse(JSON.stringify(nobetVerisi.slotlar || []));
        seciliOgr = null;
        ogrChiplariGoster();
        yerlesimGridGoster();
        document.getElementById("yerlesimModal").classList.add("aktif");
      };

      function ogrChiplariGoster(filtre) {
        filtre = filtre || "";
        const yerlesikIds = new Set(editSlotlar.map((s) => s.ogretmen_id));
        document.getElementById("yerlesikSayac").textContent =
          "(" + yerlesikIds.size + "/" + ogretmenler.length + ")";
        const list = ogretmenler.filter(
          (o) =>
            !filtre ||
            (o.ad || "").toLowerCase().includes(filtre.toLowerCase()),
        );
        document.getElementById("ogrChiplar").innerHTML = list
          .map((o) => {
            const y = yerlesikIds.has(o.id);
            const s = seciliOgr && seciliOgr.id === o.id;
            return (
              '<span class="ogr-chip' +
              (y ? " yerlesik" : "") +
              (s ? " secili" : "") +
              '" onclick="ogrSec(\'' +
              o.id +
              "')\">" +
              (o.ad || "") +
              "</span>"
            );
          })
          .join("");
      }

      window.ogrAramaFiltrele = function () {
        ogrChiplariGoster(document.getElementById("ogrArama").value);
      };

      window.ogrSec = function (id) {
        var y = new Set(
          editSlotlar.map(function (s) {
            return s.ogretmen_id;
          }),
        );
        if (y.has(id)) return;
        var o = ogretmenler.find(function (x) {
          return x.id === id;
        });
        if (!o) return;
        seciliOgr =
          seciliOgr && seciliOgr.id === id ? null : { id: id, ad: o.ad };
        ogrChiplariGoster(document.getElementById("ogrArama").value);
      };

      function yerlesimGridGoster() {
        const yerlesikMap = {};
        editSlotlar.forEach((s) => {
          yerlesikMap[s.baslangic_slot] = s;
        });
        let html = '<div class="slot-grid">';
        GUNLER.forEach((g) => {
          html += '<div class="slot-gun-baslik">' + g + "</div>";
        });
        for (let ni = 0; ni < NOKTALAR.length; ni++) {
          for (let gi = 0; gi < 5; gi++) {
            const slot = posToSlot(gi, ni);
            const s = yerlesikMap[slot];
            const slotNo = slot + 1;
            if (s) {
              const sb = s.sabitlik || "serbest";
              html +=
                '<div class="slot-hucre dolu ' +
                sb +
                '" onclick="slotTikla(' +
                slot +
                ')">';
              html += '<div class="slot-no">' + slotNo + "</div>";
              html += '<div class="slot-isim">' + s.ogretmen_ad + "</div>";
              if (sb !== "serbest")
                html += '<div style="font-size:9px;color:#888;">S-GN</div>';
              html += "</div>";
            } else {
              html +=
                '<div class="slot-hucre" onclick="slotTikla(' + slot + ')">';
              html += '<div class="slot-no">' + slotNo + "</div>";
              html += '<div class="slot-nokta">' + NOKTALAR[ni] + "</div>";
              html += "</div>";
            }
          }
        }
        html += "</div>";
        document.getElementById("yerlesimGrid").innerHTML = html;
      }

      window.slotTikla = function (slot) {
        var idx = editSlotlar.findIndex(function (s) {
          return s.baslangic_slot === slot;
        });
        if (idx >= 0) {
          editSlotlar.splice(idx, 1);
          seciliOgr = null;
          ogrChiplariGoster(document.getElementById("ogrArama").value);
          yerlesimGridGoster();
          return;
        }
        if (!seciliOgr) {
          mesaj("Önce öğretmen seçin.", "bilgi");
          return;
        }
        var sb = document.querySelector('input[name="sb"]:checked');
        var sabitlik = sb ? sb.value : "serbest";
        editSlotlar.push({
          ogretmen_id: seciliOgr.id,
          ogretmen_ad: seciliOgr.ad,
          sabitlik: sabitlik,
          baslangic_slot: slot,
        });
        seciliOgr = null;
        ogrChiplariGoster(document.getElementById("ogrArama").value);
        yerlesimGridGoster();
      };

      window.tumunuTemizle = function () {
        if (!confirm("Tüm yerleşimi temizlemek istiyor musunuz?")) return;
        editSlotlar = [];
        seciliOgr = null;
        ogrChiplariGoster("");
        yerlesimGridGoster();
      };

      window.yerlesimKaydet = async function () {
        nobetVerisi.slotlar = editSlotlar;
        await setDoc(doc(db, "nobet2_ayarlar", "mevcut"), {
          ...nobetVerisi,
          son_guncelleme: serverTimestamp(),
        });
        modalKapat("yerlesimModal");
        tabloGoster();
        mesaj("Yerleşim kaydedildi.", "basari");
      };

      window.noktaYonetimiAc = function () {
        document.getElementById("noktaListesi").innerHTML = NOKTALAR.map(
          function (n, i) {
            return (
              '<div class="nokt-item"><span style="font-size:12px;color:#888;min-width:20px;">' +
              (i + 1) +
              ".</span>" +
              '<input type="text" value="' +
              n +
              '" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;">' +
              '<button onclick="this.closest(\'.nokt-item\').remove()" style="padding:4px 10px;border:none;border-radius:6px;background:#fce8e6;color:#c5221f;cursor:pointer;font-size:12px;font-weight:600;">Sil</button></div>'
            );
          },
        ).join("");
        document.getElementById("noktaModal").classList.add("aktif");
      };

      window.noktaEkle = function () {
        var v = document.getElementById("yeniNokta").value.trim();
        if (!v) return;
        var liste = document.getElementById("noktaListesi");
        var idx = liste.children.length;
        var d = document.createElement("div");
        d.className = "nokt-item";
        d.innerHTML =
          '<span style="font-size:12px;color:#888;min-width:20px;">' +
          (idx + 1) +
          ".</span>" +
          '<input type="text" value="' +
          v +
          '" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;">' +
          '<button onclick="this.closest(\'.nokt-item\').remove()" style="padding:4px 10px;border:none;border-radius:6px;background:#fce8e6;color:#c5221f;cursor:pointer;font-size:12px;font-weight:600;">Sil</button>';
        liste.appendChild(d);
        document.getElementById("yeniNokta").value = "";
      };

      window.noktalariKaydet = async function () {
        var inputs = document.querySelectorAll(
          '#noktaListesi input[type="text"]',
        );
        var liste = [];
        inputs.forEach(function (i) {
          var v = i.value.trim();
          if (v) liste.push(v);
        });
        if (!liste.length) {
          alert("En az 1 nokta olmalı.");
          return;
        }
        await setDoc(doc(db, "nobet2_ayarlar", "noktalar"), {
          liste: liste,
          guncelleme: serverTimestamp(),
        });
        NOKTALAR = liste;
        modalKapat("noktaModal");
        tabloGoster();
        mesaj(liste.length + " nokta kaydedildi.", "basari");
      };

      window.modalKapat = function (id) {
        document.getElementById(id).classList.remove("aktif");
      };

      function mesaj(metin, tip) {
        var el = document.getElementById("mesajEl");
        el.textContent = metin;
        el.className = "mesaj-kayan mesaj-" + tip;
        el.style.display = "block";
        setTimeout(function () {
          el.style.display = "none";
        }, 3500);
      }

      onAuthStateChanged(auth, async function (user) {
        if (!user) {
          window.location.href = "/portal.html";
          return;
        }
        var ud = await getDoc(doc(db, "users", user.uid));
        if (!ud.exists()) {
          window.location.href = "/portal.html";
          return;
        }
        var rol = ud.data().rol;
        if (rol !== "admin" && rol !== "mudur_yardimcisi") {
          document.getElementById("yukleniyor").textContent =
            "Erişim yetkiniz yok.";
          return;
        }
        await init();
      });
    </script>
  </body>
</html>
